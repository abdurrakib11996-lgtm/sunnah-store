<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Islamic Store</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:'Segoe UI',sans-serif;
background:#F3F4F6;

}


.store-wrap{

max-width:420px;
margin:auto;

}



.hero{

background:linear-gradient(135deg,#ff6600,#ffb703);

padding:35px 20px;

border-radius:0 0 30px 30px;

text-align:center;

color:white;

}


.hero h1{

font-size:25px;

}


.hero p{

margin:8px;

}



.search{

position:relative;

}



.search i{

position:absolute;

left:15px;

top:13px;

color:#777;

}



.search input{

width:100%;

padding:13px 15px 13px 40px;

border-radius:15px;

border:none;

outline:none;

}



.body{

padding:20px 15px;

}


.title{

font-size:13px;

color:#777;

margin-bottom:12px;

}



.product-list{

display:flex;

flex-direction:column;

gap:12px;

}



.product{

background:white;

padding:12px;

border-radius:18px;

display:flex;

align-items:center;

gap:15px;

text-decoration:none;

color:black;

}



.product img{

width:65px;

height:65px;

border-radius:15px;

object-fit:cover;

}



.info{

flex:1;

}



.name{

font-weight:600;

font-size:16px;

}


.price{

color:#16a34a;

font-weight:bold;

margin-top:5px;

}



.badge{

background:#dcfce7;

color:#166534;

padding:3px 10px;

border-radius:20px;

font-size:11px;

display:inline-block;

margin-top:5px;

}



.arrow{

color:#999;

font-size:20px;

}



</style>


</head>


<body>


<div class="store-wrap">



<div class="hero">


<h1>🛒 AR Islamic Store</h1>

<p>Islamic Goods</p>



<div class="search">

<i class="ti ti-search"></i>

<input type="text" placeholder="পণ্য খুঁজুন..." oninput="searchProduct(this.value)">


</div>



</div>





<div class="body">


<div class="title">
সব পণ্য
</div>



<div class="product-list" id="products">



<a class="product" href="#">


<img src="topi.jpeg">


<div class="info">

<div class="name">
সাদ টুপি
</div>

<div class="price">
₹9999
</div>

<span class="badge">
নতুন
</span>

</div>


<i class="ti ti-chevron-right arrow"></i>


</a>






<a class="product" href="#">


<img src="watch.jpg">


<div class="info">

<div class="name">
Smart Watch
</div>

<div class="price">
₹1499
</div>

<span class="badge">
অফার
</span>


</div>


<i class="ti ti-chevron-right arrow"></i>


</a>






<a class="product" href="#">


<img src="headphone.jpg">


<div class="info">

<div class="name">
Headphone
</div>

<div class="price">
₹799
</div>

<span class="badge">
ফ্রি ডেলিভারি
</span>


</div>


<i class="ti ti-chevron-right arrow"></i>


</a>



</div>


</div>



</div>




<script>


function searchProduct(value){


let q=value.toLowerCase();


let items=document.querySelectorAll(".product");


items.forEach(item=>{


let name=item.querySelector(".name").innerText.toLowerCase();


if(name.includes(q)){

item.style.display="flex";

}

else{

item.style.display="none";

}



});


}



</script>



</body>

</html>
